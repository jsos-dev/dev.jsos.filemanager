name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - run: |
          node -e 'const j=require("./package.json");j.devDependencies={};fs.writeFileSync("package.json",JSON.stringify(j,null,2))'

      - run: zip -r dev.jsos.filemanager-v${{ steps.version.outputs.version }}.zip dist/ server.js package.json icon.svg

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
